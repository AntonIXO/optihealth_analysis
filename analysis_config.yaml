# OptiHealth Analysis Engine Configuration
# This file defines all the automated analyses to be run on user health data.
# Each block represents a specific insight to be generated.
# Based on your active data, I've created a set of logical analyses.
# You can disable any analysis by setting 'enabled: false'.
# CORRECTED: Function names now match the actual implementation in the Python modules.

analyses:
  # ===================================================================
  # 0. CORRELATION DISCOVERY (auto)  -- supersedes the hand-picked
  #    correlation pairs below. Scans ALL metric pairs over the full year,
  #    keeps only links that pass |r|, p-value AND Benjamini-Hochberg FDR.
  #    Tuned on Anton's real data (2026-07-01): yields ~23 honest hits vs
  #    the 1 the hardcoded list could find.
  # ===================================================================
  - name: AutoCorrelationDiscovery
    module: correlation_discovery
    enabled: true
    function: run_correlation_discovery
    parameters:
      method: "spearman"
      min_data_points: 25
      min_abs_r: 0.35
      max_p: 0.05
      max_q: 0.10          # FDR (Benjamini-Hochberg) across all tested pairs
      top_k: 15            # cap to avoid dashboard spam; ranked by |r|
      exclude_pairs:
        - ["workout_distance", "workout_duration"]

  # ===================================================================
  # 0b. LAGGED CORRELATION DISCOVERY (auto)  -- multi-horizon carry-over
  #     physiology that same-day correlation is blind to (e.g. HRV today ->
  #     lower stress tomorrow; training -> deep sleep a week later).
  #     One FDR family across all lags; best lag kept per directed pair.
  # ===================================================================
  - name: AutoLaggedCorrelationDiscovery
    module: lagged_correlation
    enabled: true
    function: run_lagged_correlation_discovery
    parameters:
      method: "spearman"
      lag_days: [1, 2, 3, 7]   # multi-horizon; one FDR family across all lags
      min_data_points: 25
      min_abs_r: 0.35
      max_p: 0.05
      max_q: 0.10
      top_k: 15
      exclude_pairs:
        - ["workout_distance", "workout_duration"]

  # ===================================================================
  # 0c. PARTIAL CORRELATION  -- for a curated set of (a, b, control) triples,
  #     report whether a raw link SURVIVES or COLLAPSES once an obvious
  #     confound is held constant. Separates genuine links from confounded ones.
  # ===================================================================
  - name: PartialCorrelationAnalysis
    module: partial_correlation
    enabled: true
    function: run_partial_correlation_analysis
    parameters:
      min_data_points: 25
      min_abs_r: 0.30
      max_raw_p: 0.05
      top_k: 15
      triples:
        - { a: "focus", b: "cognitive_score", control: "stress" }
        - { a: "stress", b: "hr", control: "hrv_rmssd" }
        - { a: "activity_steps", b: "sleep_duration_deep", control: "sleep_duration_total" }
        - { a: "concentration_index", b: "relaxation_index", control: "stress" }
        - { a: "hr_resting", b: "hrv_rmssd", control: "sleep_duration_deep" }
        - { a: "anger", b: "self_control", control: "stress" }
        - { a: "cognitive_score", b: "focus", control: "concentration_index" }

  # ===================================================================
  # 0d. WEEKLY RHYTHM (Cyclical Time, whitepaper Ch. 13) -- does a metric
  #     vary by day-of-week / weekend vs weekday? FDR across metrics.
  # ===================================================================
  - name: WeeklyRhythmAnalysis
    module: cyclical
    enabled: true
    function: run_weekly_rhythm_analysis
    parameters:
      min_data_points: 60
      min_per_weekday: 5
      max_p: 0.05
      max_q: 0.10
      top_k: 10

  # ===================================================================
  # 0e. DAY VECTOR ("Everything is a Vector", whitepaper Ch. 8, classical)
  #     Turns each day into a z-scored vector and derives holistic insights:
  #     multi-variate anomaly days, day-type archetypes, and similar-days.
  #     NOTE: this is the CLASSICAL statistical descriptor (no training) --
  #     the complementary counterpart to the learned optiHealth-EiV temporal
  #     encoder, not a replacement for it.
  # ===================================================================
  - name: DayVectorAnalysis
    module: day_vector
    enabled: true
    function: run_day_vector_analysis
    parameters:
      min_obs_per_metric: 100     # only well-covered metrics enter the vector
      min_dims_per_day: 6         # a day needs >=6 filled dims to be embedded
      add_cyclical: true          # append sin/cos day-of-week
      anomaly_percentile: 97.5
      max_anomalies: 5
      recent_anomaly_window_days: 120
      k_range: [2, 3, 4, 5, 6]
      min_silhouette: 0.15
      outcome_metric: "cognitive_score"   # optional cluster-outcome gate
      max_anova_p: 0.05
      n_similar: 5

  # ===================================================================
  # 0f. TAG IMPACT -- treats user day-tags (e.g. "sleep-cube", "sauna") as
  #     interventions and measures their same-day/next-day effect on metrics,
  #     with a vector-matched (propensity-style) confirmation. FDR across the
  #     (tag x metric x horizon) family. Silent until the user tags >= min days.
  # ===================================================================
  - name: TagImpactAnalysis
    module: tag_impact
    enabled: true
    function: run_tag_impact_analysis
    parameters:
      min_tagged_days: 5
      min_untagged_days: 5
      horizons: [0, 1]         # same day + next day
      max_p: 0.05
      max_q: 0.10
      top_k: 15
      min_abs_effect: 0.30     # |rank-biserial|
      min_obs_per_metric: 60
      min_dims_per_day: 5

  # ===================================================================
  # 0g. CHANGE-POINT / REGIME SHIFT -- dates sustained baseline shifts in a
  #     metric (e.g. resting HR stepped up in late Jan). CUSUM + bootstrap,
  #     binary segmentation, FDR across metrics. The "when did my baseline
  #     change?" question that correlation/forecasting can't answer.
  # ===================================================================
  - name: ChangePointAnalysis
    module: change_point
    enabled: true
    function: run_change_point_analysis
    parameters:
      min_obs_per_metric: 80
      min_segment_len: 21      # each regime must be >= 3 weeks
      min_confidence: 0.95     # bootstrap confidence a change exists
      min_shift_sd: 0.6        # only report level shifts >= 0.6 SD
      n_bootstrap: 1000
      max_depth: 3             # up to ~2^3 segments per metric
      top_k: 12
      max_q: 0.10              # FDR across metrics

  # ===================================================================
  # 1. GOAL TRACKING
  # Analyzes progress against user-defined goals from the database.
  # ===================================================================
  # - name: GoalStreakAnalysis
  #   module: goals
  #   enabled: true
  #   function: run_goal_adherence_analysis # Corrected function name
  #   parameters:
  #     # Generate a motivational insight after a 3-day goal streak.
  #     min_streak_for_insight: 3

  # ===================================================================
  # 2. CORRELATION ANALYSIS (LEGACY, hand-picked)
  # Superseded by AutoCorrelationDiscovery above. Kept disabled for reference.
  # ===================================================================
  - name: Correlate_TotalSleep_vs_Stress
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "sleep_duration_total"
      metric_b: "stress"
      method: "spearman" # Best for monotonic, not necessarily linear, relationships.
      min_data_points: 20
      significance_threshold: 0.35

  - name: Correlate_DeepSleep_vs_HeartRate
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "sleep_duration_deep"
      metric_b: "hr"
      method: "spearman"
      min_data_points: 20
      significance_threshold: 0.35

  - name: Correlate_Steps_vs_DeepSleep
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "activity_steps"
      metric_b: "sleep_duration_deep"
      method: "pearson" # A linear relationship is plausible here.
      min_data_points: 20
      significance_threshold: 0.4

  - name: Correlate_WorkoutDuration_vs_Relaxation
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "workout_duration"
      metric_b: "relaxation_index"
      method: "spearman"
      min_data_points: 20
      significance_threshold: 0.4

  - name: Correlate_Stress_vs_Focus
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "stress"
      metric_b: "focus"
      method: "spearman"
      min_data_points: 20
      significance_threshold: 0.4

  # --- New Deeper Correlations ---
  - name: Correlate_REMSleep_vs_Concentration
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "sleep_duration_rem"
      metric_b: "concentration_index"
      method: "spearman"
      min_data_points: 25
      significance_threshold: 0.4

  - name: Correlate_Fatigue_vs_LightSleep
    module: correlation
    enabled: false  # superseded by AutoCorrelationDiscovery
    function: run_correlation_analysis # Corrected function name
    parameters:
      metric_a: "fatigue_score"
      metric_b: "sleep_duration_light"
      method: "spearman"
      min_data_points: 25
      significance_threshold: 0.4

  # ===================================================================
  # 3. COMPARATIVE ANALYSIS
  # Compares a metric on days following an event vs. all other days.
  # ===================================================================
  - name: Compare_HeartRate_After_Running
    module: comparative
    enabled: true
    function: run_comparative_analysis # Corrected function name
    parameters:
      # Assumes 'Running' is a possible value in your 'workout_type' data.
      event_name: "Running"
      metric: "hr"
      analysis_type: "mannwhitneyu" # Robust non-parametric test.
      time_window_days: 1 # Compares the day immediately after the run.
      min_group_size: 5
      significance_threshold: 0.05

  - name: Compare_Stress_After_Workout
    module: comparative
    enabled: true
    function: run_comparative_analysis # Corrected function name
    parameters:
      # A generic check for any workout type.
      event_name: "Workout"
      metric: "stress"
      analysis_type: "mannwhitneyu"
      time_window_days: 1
      min_group_size: 7
      significance_threshold: 0.05

  # --- New Deeper Comparison ---
  - name: Compare_CognitiveScore_After_Workout
    module: comparative
    enabled: true
    function: run_comparative_analysis # Corrected function name
    parameters:
      event_name: "Workout"
      metric: "cognitive_score"
      analysis_type: "mannwhitneyu"
      time_window_days: 1
      min_group_size: 10
      significance_threshold: 0.05


  # ===================================================================
  # 4. CLUSTERING ANALYSIS
  # Discovers hidden "Day Types" by grouping days with similar metrics.
  # Gated on cluster separation (silhouette) AND outcome separation (ANOVA).
  # ===================================================================
  - name: Cluster_DayArchetypes_For_CognitiveScore
    module: clustering
    enabled: true
    function: run_day_clustering_analysis # Corrected function name
    parameters:
      metrics_to_cluster:
        - "activity_steps"
        - "sleep_duration_total"
        - "stress"
        - "workout_duration"
      # Evaluate clusters based on their average cognitive score.
      outcome_metric: "cognitive_score"
      # Find 4 distinct day types (e.g., Active/Rested, Stressed/Inactive, etc.)
      n_clusters: 4
      min_days: 30
      min_silhouette: 0.15   # clusters must be genuinely separated
      max_anova_p: 0.05      # clusters must differ in the outcome metric

  # --- New Deeper Clustering ---
  - name: Cluster_RecoveryArchetypes
    module: clustering
    enabled: true
    function: run_day_clustering_analysis # Corrected function name
    parameters:
      metrics_to_cluster:
        - "hr"
        - "stress"
        - "fatigue_score"
        - "sleep_duration_deep"
      # Evaluate clusters based on how well-recovered you are the next day.
      outcome_metric: "reverse_fatigue"
      n_clusters: 3
      min_days: 35
      min_silhouette: 0.15
      max_anova_p: 0.05

  # ===================================================================
  # 5. FEATURE IMPORTANCE ANALYSIS
  # Finds the most powerful predictors for a key health outcome.
  # Gated on cross-validated R^2 (model must generalize out-of-sample).
  # ===================================================================
  - name: FeatureImportance_For_CognitiveScore
    module: feature_importance
    enabled: true
    function: run_feature_importance_analysis # Corrected function name
    parameters:
      target_metric: "cognitive_score"
      feature_metrics:
        - "sleep_duration_total"
        - "sleep_duration_deep"
        - "sleep_duration_rem"
        - "activity_steps"
        - "workout_calories_burned"
        - "stress"
        - "fatigue_score"
        - "hr"
        - "concentration_index"
      min_days: 30
      # Report the top 3 most influential factors for cognitive performance.
      top_n_features: 3
      min_cv_r2: 0.05        # require the model to generalize out-of-sample

  - name: FeatureImportance_For_Stress
    module: feature_importance
    enabled: true
    function: run_feature_importance_analysis # Corrected function name
    parameters:
      target_metric: "stress"
      feature_metrics:
        - "sleep_duration_total"
        - "sleep_duration_awake"
        - "activity_steps"
        - "workout_duration"
        - "focus"
        - "anger"
        - "fatigue_score"
      min_days: 30
      top_n_features: 3
      min_cv_r2: 0.05        # require the model to generalize out-of-sample

  # --- New Deeper Feature Importance ---
  - name: FeatureImportance_For_DeepSleep
    module: feature_importance
    enabled: true
    function: run_feature_importance_analysis # Corrected function name
    parameters:
      target_metric: "sleep_duration_deep"
      feature_metrics:
        - "activity_steps"
        - "workout_calories_burned"
        - "stress"
        - "body_temperature"
        - "concentration_index"
      min_days: 35
      top_n_features: 3
      min_cv_r2: 0.05        # require the model to generalize out-of-sample

  # ===================================================================
  # 6. FORECASTING ANALYSIS
  # Analyzes trends, projects future values, and detects anomalies.
  # ===================================================================
  - name: Forecast_Stress_Trend
    module: forecasting
    enabled: true
    function: run_forecasting_and_anomaly_analysis # Corrected function name
    parameters:
      metric_to_forecast: "stress"
      days_to_forecast: 14
      min_days: 28
      desired_trend: "decreasing"
      anomaly_sensitivity: 0.99

  - name: Forecast_CognitiveScore_Trend
    module: forecasting
    enabled: true
    function: run_forecasting_and_anomaly_analysis # Corrected function name
    parameters:
      metric_to_forecast: "cognitive_score"
      days_to_forecast: 14
      min_days: 28
      desired_trend: "increasing"
      anomaly_sensitivity: 0.98

  - name: Forecast_ActivitySteps_Trend
    module: forecasting
    enabled: true
    function: run_forecasting_and_anomaly_analysis # Corrected function name
    parameters:
      metric_to_forecast: "activity_steps"
      days_to_forecast: 14
      min_days: 28
      desired_trend: "increasing"
      anomaly_sensitivity: 0.98

  # --- New Deeper Forecast ---
  - name: Forecast_Fatigue_Trend
    module: forecasting
    enabled: true
    function: run_forecasting_and_anomaly_analysis # Corrected function name
    parameters:
      metric_to_forecast: "fatigue_score"
      days_to_forecast: 14
      min_days: 30
      desired_trend: "decreasing"
      anomaly_sensitivity: 0.98

  - name: SupplementImpactDiscovery
    module: supplements
    enabled: true
    # --- FIX ---
    # The function name has been corrected to match the actual implementation
    # in analysis/supplements.py.
    function: find_best_supplement_impact
    parameters:
      # A list of key health metrics to test against.
      # The engine will check the impact of each supplement on each of these.
      outcome_metrics:
        - "sleep_score"
        - "hrv_rmssd"
        - "hr_resting"
        - "sleep_duration_deep"

      # A list of lifestyle factors to control for in the analysis.
      # This makes the insight more reliable by isolating the supplement's effect.
      confounding_metrics:
        - "activity_steps"
        - "sleep_duration_total"
        - "workout_duration"
        - "workout_distance"
        - "workout_calories_burned"
        - "hrv_rmssd"
        - "body_temperature"
        - "blood_oxygen_spo2"
        - "respiratory_rate"
        - "sleep_duration_deep"
        - "sleep_duration_light"
        - "sleep_duration_rem"
        - "sleep_duration_awake"
        - "sleep_score"
        - "cognitive_score"
        - "focus"
        - "chill"
        - "stress"
        - "self_control"
        - "anger"
        - "relaxation_index"
        - "concentration_index"
        - "fatigue_score"
        - "reverse_fatigue"
        - "alpha_gravity"
        - "iAPF"
        - "iAF"

      # The minimum p-value to consider a finding "statistically significant".
      # A lower value (e.g., 0.05) is more strict. 0.1 is reasonable for discovery.
      # p_value_threshold: 0.1
